<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados</title>
  <link rel="stylesheet" href="../estilos/estilos.css">
</head>

<body class="results">

  <div class="search-header">
    <div class="logo-small" onclick="window.location.href='busqueda.html'">
      Papers.co
    </div>

    <form id="searchForm">
      <input 
        type="text" 
        id="searchInput" 
        class="search-box" 
        placeholder="Buscar..."
      />
    </form>
  </div>

  <div class="container">
    <h1>Resultados</h1>
    <div id="resultados"></div>
  </div>

  <div id="pagination"></div>

  <script type="module">
    import { busquedaDocumentos } from "../conexion/api.js";
    let currentPage = 1;
    
    async function cargarResultados() {
      
      console.log("Página actual:", currentPage);
     
      const query = localStorage.getItem("query");
      console.log("Enviando a API:", query, currentPage);

      if (!query) {
        document.getElementById("resultados").innerHTML = "<p>No hay búsqueda.</p>";
        return;
      }

      const response = await busquedaDocumentos(query, currentPage);
      const data = response.results;

      const container = document.getElementById("resultados");
      container.innerHTML = "";

      if (!data || data.length === 0) {
        container.innerHTML = "<p>No se encontraron resultados.</p>";
        return;
      }

      data.forEach(doc => {
        const div = document.createElement("div");
        div.classList.add("resultado-item");

        div.innerHTML = `
          <h3>${doc.title || "Sin título"}</h3>
          
          <a href="${doc.doi || "#"}" target="_blank">Ver paper</a>

          <p class="meta">
            Año: ${doc.year || "N/A"} | Citas: ${doc.citations || 0}
          </p>

          <p class="authors">
            ${
              Array.isArray(doc.authors)
                ? doc.authors.join(", ")
                : doc.authors || "N/A"
            }
          </p>
        `;

        container.appendChild(div);
      });
      renderPagination(response)
      
    }

    function renderPagination(response) {
    const pagination = document.getElementById("pagination");
    pagination.innerHTML = "";

    const totalPages = Math.ceil(response.total / response.size);

    if (currentPage > 1) {
      const prev = document.createElement("button");
      prev.innerText = "← Anterior";
      prev.onclick = () => {
        currentPage--;
        cargarResultados();
      };
      pagination.appendChild(prev);
    }

    const info = document.createElement("span");
    info.innerText = ` Página ${currentPage} de ${totalPages} `;
    pagination.appendChild(info);

    if (currentPage < totalPages) {
      const next = document.createElement("button");
      next.innerText = "Siguiente →";
      next.onclick = () => {
        currentPage++;
        cargarResultados();
      };
      pagination.appendChild(next);
    }
  }

    cargarResultados();

    document.getElementById("searchForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const query = document.getElementById("searchInput").value;
      localStorage.setItem("query", query);
      location.reload();
    });
  </script>

</body>
</html>
