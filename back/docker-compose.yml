version: "3.9"

services:

  mongo:
    build: ./db
    container_name: mongo_colombia
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  engine:
    build: ./engine
    container_name: engine
    depends_on:
      - mongo
      - elasticsearch
    environment:
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}

  api:
    build: ./api
    container_name: api
    depends_on:
      - elasticsearch
    ports:
      - "5000:5000"

volumes:
  mongo_data:
